<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ChoiceDraft</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="bg-app">
  <div class="home-layout">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header flex items-center gap-3">
        <div class="sidebar-logo-icon">

          </svg>
        </div>
        <span class="auth-header-title sidebar-logo-text">ChoiceDraft</span>
        <button class="close-menu sidebar-close-btn" id="closeMenuBtn" title="Close Menu" aria-label="Close Menu">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- User Info Block -->
      <div id="sidebarUserBlock" class="sidebar-user-block hidden">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <p class="user-name" id="userName">User Name</p>
          <p class="user-email" id="userEmail">user@example.com</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item active">
          <div class="nav-icon"><i class="fa-solid fa-chalkboard"></i></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="profile.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>
          <span class="nav-label">Profile</span>
        </a>
        <a href="settings.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-gear"></i></div>
          <span class="nav-label">Settings</span>
        </a>
        <a href="about.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-circle-info"></i></div>
          <span class="nav-label">About Us</span>
        </a>
        <div class="flex-1"></div>
        <button id="logoutBtn" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="topbar-logo-text"><span class="text-primary font-black">Choice</span><span class="text-secondary font-black">Draft</span></div>
        </div>
        <div class="flex items-center gap-2">
          <input type="text" id="searchInput" class="topbar-search hidden" placeholder="Search tests...">
          <button id="searchBtn" class="topbar-icon-btn" title="Search"><i
              class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area fade-in">
        <div class="home-content">
          <div class="flex items-center justify-between mb-6 pt-2">
            <h2 id="homeTitle" class="section-title">My Projects</h2>
          </div>

          <!-- Tabs -->
          <div class="flex border-b border-light mb-6">
            <button id="myTestsTab" class="tab-btn active">My Projects</button>
            <button id="takeTestTab" class="tab-btn">Take Tests</button>
          </div>

          <!-- Grid Container -->
          <div id="testsGrid" class="tests-grid mb-10">
            <!-- Test cards injected by JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- Modal for Quick Actions -->
    <div id="actionModal" class="modal-overlay hidden">
      <div class="modal-content">
        <h3 id="actionModalTitle" class="modal-title">Action</h3>
        <p id="actionModalText" class="modal-text">You are performing an action on this test.</p>
        <div class="flex gap-3 mt-6">
          <button id="closeActionModalBtn" class="btn-outline flex-1">Close</button>
          <button id="actionModalConfirmBtn" class="btn-primary flex-1">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { navigateTo, dataService } from './app.js';

    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    const myTestsTab = document.getElementById('myTestsTab');
    const takeTestTab = document.getElementById('takeTestTab');
    const createNewBtn = document.getElementById('createNewBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const testsGridContainer = document.getElementById('testsGrid');
    const homeTitle = document.getElementById('homeTitle');

    const sidebarUserBlock = document.getElementById('sidebarUserBlock');
    const userNameEl = document.getElementById('userName');
    const userEmailEl = document.getElementById('userEmail');
    const userAvatarEl = document.getElementById('userAvatar');

    let allTests = [];
    let currentTab = 'my';
    let currentUserId = null;

    function toggleSidebar(open) {
      if (open) {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      } else {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      }
    }

    menuToggleBtn.addEventListener('click', () => toggleSidebar(true));
    closeMenuBtn.addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

    searchBtn.addEventListener('click', () => {
      searchInput.classList.toggle('hidden');
      if (!searchInput.classList.contains('hidden')) {
        searchInput.focus();
      }
    });

    searchInput.addEventListener('input', () => filterAndRender());
    myTestsTab.addEventListener('click', () => switchTab('my'));
    takeTestTab.addEventListener('click', () => switchTab('take'));

    function switchTab(tab) {
      currentTab = tab;
      myTestsTab.classList.toggle('active', tab === 'my');
      takeTestTab.classList.toggle('active', tab === 'take');
      homeTitle.textContent = tab === 'my' ? 'My Projects' : 'Available Tests';
      createNewBtn.classList.toggle('hidden', tab === 'take');
      filterAndRender();
    }

    logoutBtn.addEventListener('click', async () => {
      await dataService.logout();
      navigateTo('signin.html');
    });
    createNewBtn.addEventListener('click', () => navigateTo('create-test.html'));

    // Modal logic
    const actionModal = document.getElementById('actionModal');
    const closeActionModalBtn = document.getElementById('closeActionModalBtn');
    const actionModalConfirmBtn = document.getElementById('actionModalConfirmBtn');
    const actionModalTitle = document.getElementById('actionModalTitle');
    const actionModalText = document.getElementById('actionModalText');

    let pendingAction = null;
    let pendingTestId = null;

    window.openTestModal = (action, testName, id) => {
      pendingAction = action;
      pendingTestId = id;
      actionModalTitle.textContent = `${action} Test`;
      if (action === 'Edit') {
        actionModalText.textContent = `You are opening the editor for "${testName}".`;
      } else if (action === 'Collaborators') {
        actionModalText.textContent = `Manage users with access to "${testName}".`;
      } else if (action === 'Stats') {
        actionModalText.textContent = `Viewing performance analytics for "${testName}".`;
      }
      actionModal.style.display = 'flex';
    };

    const closeModal = () => actionModal.style.display = 'none';
    closeActionModalBtn.addEventListener('click', closeModal);
    actionModalConfirmBtn.addEventListener('click', () => {
      if (pendingAction === 'Edit' && pendingTestId) {
        navigateTo(`test-details.html?id=${pendingTestId}`);
      }
      closeModal();
    });

    async function loadDashboard() {
      testsGridContainer.innerHTML = '<p class="tests-loading-state">Loading tests...</p>';

      const user = await dataService.getCurrentUser();
      allTests = await dataService.getTests();
      currentUserId = user ? user.id : null;

      if (user) {
        sidebarUserBlock.classList.remove('hidden');
        userNameEl.textContent = user.name;
        userEmailEl.textContent = user.email;
        userAvatarEl.textContent = user.name.charAt(0).toUpperCase();
      }

      filterAndRender();
    }

    function filterAndRender() {
      const query = searchInput.value.toLowerCase();
      let filtered = allTests.filter(t => {
        const matchesQuery = t.title.toLowerCase().includes(query) || (t.description && t.description.toLowerCase().includes(query));
        if (currentTab === 'my') {
          return matchesQuery && (t.ownerId === currentUserId || (t.collaborators && t.collaborators.some(c => c.userId === currentUserId)));
        } else {
          return matchesQuery && (t.ownerId !== currentUserId);
        }
      });
      renderTests(filtered);
    }

    function renderTests(tests) {
      if (!tests || tests.length === 0) {
        const isMyTab = currentTab === 'my';
        testsGridContainer.innerHTML = `
          <div class="tests-empty-state">
            <i class="fa-solid ${isMyTab ? 'fa-folder-open' : 'fa-magnifying-glass'} tests-empty-icon"></i>
            <p class="tests-empty-title">${isMyTab ? 'No tests yet' : 'No tests available'}</p>
            <p class="tests-empty-sub">${isMyTab 
              ? 'Create your first test to get started.' 
              : 'There are no tests from other users to take right now.'}</p>
            ${isMyTab ? `<button class="btn-primary" style="width:auto;padding:10px 28px;font-size:16px;border-radius:50px;margin-top:4px;" onclick="window.location.href='create-test.html'"><i class="fa-solid fa-plus" style="margin-right:8px;"></i>Create New Test</button>` : ''}
          </div>`;
        return;
      }

      testsGridContainer.innerHTML = tests.map(test => {
        const isOwner = test.ownerId === currentUserId;
        const qCount = test.questions ? test.questions.length : 0;
        const totalPoints = (test.questions || []).reduce((sum, q) => sum + (q.points || 10), 0);

        return `
          <div class="test-card" onclick="window.location.href='test-details.html?id=${test.id}'" style="cursor: pointer;">
            <div class="test-card-header">
              <h3 class="test-card-title">${test.title}</h3>
              <span class="test-status-badge badge-${test.status === 'Published' ? 'published' : 'draft'}">${test.status || 'Draft'}</span>
            </div>
            ${test.description ? `<p class="test-card-desc">${test.description.slice(0, 80)}...</p>` : ''}
            <div class="test-card-chips">
              <span class="test-card-chip"><i class="fa-solid fa-list-ol"></i> ${qCount} questions</span>
              <span class="test-card-chip"><i class="fa-solid fa-check-circle"></i> ${totalPoints} pts</span>
            </div>
            <div class="test-card-footer">
              <div class="test-card-badges">
                ${isOwner ? '<span class="test-card-badge-owner">Owner</span>' : ''}
              </div>
              <div class="test-card-actions" onclick="event.stopPropagation()">
                ${isOwner ? `
                  <button class="btn-secondary" onclick="openTestModal('Edit', '${test.title.replace(/'/g, "\\'")}', '${test.id}')"><i class="fa-solid fa-pencil"></i></button>
                  <button class="btn-secondary" onclick="openTestModal('Collaborators', '${test.title.replace(/'/g, "\\'")}', '${test.id}')"><i class="fa-solid fa-users"></i></button>
                  <button class="btn-secondary" onclick="openTestModal('Stats', '${test.title.replace(/'/g, "\\'")}', '${test.id}')"><i class="fa-solid fa-chart-pie"></i></button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    loadDashboard();
  </script>

  <!-- Floating Action Button -->
  <button id="createNewBtn" class="fab-btn">
    <i class="fa-solid fa-plus"></i>
    <span>Create New</span>
  </button>
</body>

</html>
