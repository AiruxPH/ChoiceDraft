<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiceDraft - Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-layout split-layout">
    
    <!-- Dynamic Header -->
    <header class="auth-header">
      <div id="headerLogo" class="auth-header-logo"></div>
      <p class="auth-header-title">ChoiceDraft</p>
    </header>

    <!-- Centered Auth Card -->
    <div class="auth-card-container">
      <div class="auth-card">
        <div class="auth-content">
          <h2 class="auth-title">Welcome Back!</h2>
          <p class="auth-subtitle">Sign in to continue</p>

          <form id="signInForm" class="auth-form">
            <div id="errorBox" class="auth-error-box">
              <i class="fa-solid fa-circle-exclamation auth-error-icon"></i>
              <p id="errorText" class="auth-error-text"></p>
            </div>

            <div class="input-group">
              <label class="input-label">Email Address</label>
              <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
              <label class="input-label">Password</label>
              <div class="password-input-wrapper">
                <input type="password" id="password" class="input-field password-input" placeholder="••••••••" required>
                <button type="button" id="togglePwBtn" class="auth-toggle-btn" title="Toggle Password">
                  <i class="fa-solid fa-eye" id="pwIcon"></i>
                </button>
              </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary mt-2">
              Sign In
            </button>
          </form>

          <div class="divider-container">
            <div class="divider-line"></div>
            <p class="divider-text">or</p>
            <div class="divider-line"></div>
          </div>

          <p class="text-center auth-footer-text">
            Don't have an account? <a href="register.html" class="text-primary font-bold underline">Register</a>
          </p>

          <!-- Demo Hint -->
          <div class="auth-demo-wrapper mt-4">
            <div class="auth-demo-box">
              <p class="text-secondary font-bold auth-demo-title">Demo Account</p>
              <p class="text-light auth-demo-text">Email: alex@example.com</p>
              <p class="text-light auth-demo-text">Password: password123</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { icons, dataService, navigateTo } from './app.js';
    
    document.getElementById('headerLogo').innerHTML = icons.logo;

    const form = document.getElementById('signInForm');
    const emailInput = document.getElementById('email');
    const pwInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePwBtn');
    const pwIcon = document.getElementById('pwIcon');
    const submitBtn = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    // Toggle Password Visibility
    toggleBtn.addEventListener('click', () => {
      const type = pwInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwInput.setAttribute('type', type);
      pwIcon.className = type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    });

    // Handle Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      const res = await dataService.login(emailInput.value, pwInput.value);
      
      if (res.success) {
        navigateTo('home.html');
      } else {
        errorText.textContent = res.error;
        errorBox.style.display = 'flex';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

  </script>
</body>
</html>
