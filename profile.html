<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiceDraft - Profile</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-app">
  <div class="home-layout">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->

      <div class="sidebar-header flex items-center gap-3">
        <div class="sidebar-logo-icon">

              fill="white" fill-rule="evenodd" />
          </svg>
        </div>
        <span class="auth-header-title sidebar-logo-text">ChoiceDraft</span>
        <button class="close-menu sidebar-close-btn" id="closeMenuBtn" title="Close Menu" aria-label="Close Menu">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>

      <!-- User Info Block -->
      <div id="sidebarUserBlock" class="sidebar-user-block hidden">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <p class="user-name" id="userName">User Name</p>
          <p class="user-email" id="userEmail">user@example.com</p>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="home.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-chalkboard"></i></div>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="profile.html" class="nav-item active">
          <div class="nav-icon"><i class="fa-solid fa-user"></i></div>
          <span class="nav-label">Profile</span>
        </a>
        <a href="settings.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-gear"></i></div>
          <span class="nav-label">Settings</span>
        </a>
        <a href="about.html" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-circle-info"></i></div>
          <span class="nav-label">About Us</span>
        </a>
        <div class="flex-1"></div>
        <button id="logoutBtn" class="nav-item">
          <div class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
          <span class="nav-label">Log Out</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="home-main">
      <!-- Header -->
      <header class="topbar">
        <div class="flex items-center gap-2">
          <button id="menuToggleBtn" class="topbar-icon-btn" title="Toggle Menu" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars topbar-menu-icon"></i>
          </button>
          <span class="topbar-title">My Profile</span>
        </div>
        <div class="flex items-center gap-1">
          <a href="home.html" class="topbar-icon-btn flex items-center justify-center" title="Dashboard" aria-label="Dashboard">
            <i class="fa-solid fa-table-cells-large topbar-home-icon"></i>
          </a>
        </div>
      </header>

      <!-- Scrollable Content -->
      <div class="main-scroll-area fade-in">
        <div class="home-content">
          <!-- View Mode -->
          <div id="viewMode" class="test-card text-center profile-card">
            <div class="profile-avatar-container" id="pageProfileAvatar">A</div>
            <h2 class="test-card-title mb-0 profile-name" id="displayName">Alex Educator</h2>
            <p class="test-card-meta mb-0 profile-email" id="displayEmail">alex@example.com</p>
            <div class="divider-line profile-divider"></div>
            <div class="flex flex-col gap-4 text-left">
              <div>
                <span class="font-bold text-secondary">Role:</span>
                <span class="text-light profile-info-val" id="displayRole">Teacher</span>
              </div>
              <div>
                <span class="font-bold text-secondary">School / Institution:</span>
                <span class="text-light profile-info-val" id="displayInstitution">Springfield High</span>
              </div>
            </div>
            <button id="editProfileBtn" class="btn-primary profile-edit-btn">
              <i class="fa-solid fa-pen-to-square mr-2"></i> Edit Profile
            </button>
          </div>

          <!-- Edit Mode (hidden by default) -->
          <div id="editMode" class="test-card profile-card hidden">
            <h3 class="font-zain font-800 text-18 mb-4 text-secondary">Edit Profile</h3>
            <div id="profileSaveError" class="auth-error-box mb-4" style="display:none;">
              <i class="fa-solid fa-circle-exclamation auth-error-icon"></i>
              <p id="profileSaveErrorText" class="auth-error-text"></p>
            </div>
            <div class="flex flex-col gap-4">
              <div class="input-group">
                <label class="input-label">Full Name</label>
                <input type="text" id="editName" class="input-field" placeholder="Your full name">
              </div>
              <div class="input-group">
                <label class="input-label">Email Address</label>
                <input type="email" id="editEmail" class="input-field" placeholder="your@email.com">
              </div>
              <div class="input-group">
                <label class="input-label">Role</label>
                <select id="editRole" class="input-field">
                  <option value="Teacher">Teacher</option>
                  <option value="Student">Student</option>
                  <option value="Contributor">Contributor</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
              <div class="input-group">
                <label class="input-label">School / Institution</label>
                <input type="text" id="editInstitution" class="input-field" placeholder="Your school or institution">
              </div>
              <div class="input-group">
                <label class="input-label">New Password <span class="text-light" style="font-size:13px;">(leave blank to keep current)</span></label>
                <div class="password-input-wrapper">
                  <input type="password" id="editPassword" class="input-field password-input" placeholder="••••••••">
                  <button type="button" id="toggleEditPw" class="auth-toggle-btn">
                    <i class="fa-solid fa-eye" id="editPwIcon"></i>
                  </button>
                </div>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button id="cancelEditBtn" class="btn-outline flex-1 rounded-full">Cancel</button>
              <button id="saveProfileBtn" class="btn-primary flex-1 rounded-full">Save Changes</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { dataService, navigateTo } from './app.js';

    // --- Sidebar ---
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const sidebarUserBlock = document.getElementById('sidebarUserBlock');
    const userAvatar = document.getElementById('userAvatar');
    const userName = document.getElementById('userName');
    const userEmail = document.getElementById('userEmail');

    document.getElementById('menuToggleBtn').addEventListener('click', () => toggleSidebar(true));
    document.getElementById('closeMenuBtn').addEventListener('click', () => toggleSidebar(false));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await dataService.logout();
      navigateTo('signin.html');
    });

    function toggleSidebar(open) {
      sidebar.classList.toggle('open', open);
      sidebarOverlay.classList.toggle('open', open);
    }

    // --- Profile View/Edit Elements ---
    const viewMode = document.getElementById('viewMode');
    const editMode = document.getElementById('editMode');
    const pageProfileAvatar = document.getElementById('pageProfileAvatar');
    const displayName = document.getElementById('displayName');
    const displayEmail = document.getElementById('displayEmail');
    const displayRole = document.getElementById('displayRole');
    const displayInstitution = document.getElementById('displayInstitution');

    const editNameInput = document.getElementById('editName');
    const editEmailInput = document.getElementById('editEmail');
    const editRoleInput = document.getElementById('editRole');
    const editInstitutionInput = document.getElementById('editInstitution');
    const editPasswordInput = document.getElementById('editPassword');
    const saveErrorBox = document.getElementById('profileSaveError');
    const saveErrorText = document.getElementById('profileSaveErrorText');

    // Toggle password visibility
    document.getElementById('toggleEditPw').addEventListener('click', () => {
      const isPassword = editPasswordInput.type === 'password';
      editPasswordInput.type = isPassword ? 'text' : 'password';
      document.getElementById('editPwIcon').className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    let currentUser = null;

    function populateView(user) {
      pageProfileAvatar.textContent = user.name.charAt(0).toUpperCase();
      displayName.textContent = user.name;
      displayEmail.textContent = user.email;
      displayRole.textContent = user.role || '—';
      displayInstitution.textContent = user.institution || '—';
    }

    function enterEditMode() {
      editNameInput.value = currentUser.name;
      editEmailInput.value = currentUser.email;
      editRoleInput.value = currentUser.role || 'Teacher';
      editInstitutionInput.value = currentUser.institution || '';
      editPasswordInput.value = '';
      saveErrorBox.style.display = 'none';
      viewMode.classList.add('hidden');
      editMode.classList.remove('hidden');
    }

    function exitEditMode() {
      editMode.classList.add('hidden');
      viewMode.classList.remove('hidden');
    }

    document.getElementById('editProfileBtn').addEventListener('click', enterEditMode);
    document.getElementById('cancelEditBtn').addEventListener('click', exitEditMode);

    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const newName = editNameInput.value.trim();
      const newEmail = editEmailInput.value.trim();
      const newRole = editRoleInput.value;
      const newInstitution = editInstitutionInput.value.trim();
      const newPassword = editPasswordInput.value;

      if (!newName || !newEmail) {
        saveErrorBox.style.display = 'flex';
        saveErrorText.textContent = 'Name and email are required.';
        return;
      }

      // Check if email is taken by another user
      const allUsers = dataService.data.users;
      const emailTaken = allUsers.some(u => u.email === newEmail && u.id !== currentUser.id);
      if (emailTaken) {
        saveErrorBox.style.display = 'flex';
        saveErrorText.textContent = 'That email is already in use by another account.';
        return;
      }

      // Update user in users array
      const userIndex = allUsers.findIndex(u => u.id === currentUser.id);
      if (userIndex !== -1) {
        dataService.data.users[userIndex].name = newName;
        dataService.data.users[userIndex].email = newEmail;
        dataService.data.users[userIndex].role = newRole;
        dataService.data.users[userIndex].institution = newInstitution;
        if (newPassword) {
          dataService.data.users[userIndex].password = newPassword;
        }
      }

      // Update current session
      currentUser.name = newName;
      currentUser.email = newEmail;
      currentUser.role = newRole;
      currentUser.institution = newInstitution;
      dataService.data.currentUser = currentUser;
      dataService.save();

      // Refresh view
      populateView(currentUser);
      // Also update sidebar
      userName.textContent = currentUser.name;
      userEmail.textContent = currentUser.email;
      userAvatar.textContent = currentUser.name.charAt(0).toUpperCase();

      exitEditMode();
    });

    // --- Init ---
    async function init() {
      currentUser = await dataService.getCurrentUser();
      if (!currentUser) {
        navigateTo('signin.html');
        return;
      }
      sidebarUserBlock.classList.remove('hidden');
      userName.textContent = currentUser.name;
      userEmail.textContent = currentUser.email;
      userAvatar.textContent = currentUser.name.charAt(0).toUpperCase();
      populateView(currentUser);
    }

    init();
  </script>
</body>
</html>
